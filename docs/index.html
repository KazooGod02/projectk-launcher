<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Project K</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',system-ui,sans-serif;cursor:default}
  /* ── VACÍO DEL ESPACIO ── */
  #space{position:fixed;inset:0;z-index:0;
    background:radial-gradient(ellipse 90% 90% at 50% 45%, #0b1026 0%, #05060f 55%, #000 100%)}
  #stars{position:fixed;inset:0;z-index:1;pointer-events:none}
  .star{position:absolute;background:#fff;border-radius:50%;animation:tw var(--d) ease-in-out infinite alternate}
  @keyframes tw{from{opacity:.12}to{opacity:1}}
  /* estrellas fugaces ocasionales */
  .shootingstar{position:fixed;height:2px;width:120px;z-index:1;pointer-events:none;
    background:linear-gradient(to right,rgba(255,255,255,0),rgba(255,255,255,.9));border-radius:2px}

  /* ── RAYOS DE LUZ ── */
  #rays{position:fixed;top:50%;left:50%;z-index:3;pointer-events:none}
  .ray{position:absolute;top:0;left:0;height:2px;width:0;transform-origin:0 50%;border-radius:2px;
    filter:blur(.4px);opacity:0;
    background:linear-gradient(to right, rgba(255,238,205,.95), rgba(255,214,150,0))}
  .ray.go{animation:rayGo var(--rt) ease-out forwards}
  @keyframes rayGo{0%{width:0;opacity:0}12%{opacity:1}100%{width:var(--len);opacity:0}}

  /* ── SOL / BOTÓN DE DESCARGA ── */
  #sun{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;
    width:150px;height:150px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;text-decoration:none;animation:float 6s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translate(-50%,-52%)}50%{transform:translate(-50%,-48%)}}
  #sun .glow{position:absolute;inset:-70%;border-radius:50%;
    background:radial-gradient(circle, rgba(255,236,190,.9) 0%, rgba(255,190,110,.35) 35%, rgba(255,160,80,0) 70%);
    filter:blur(14px);animation:sunpulse 4s ease-in-out infinite}
  @keyframes sunpulse{0%,100%{opacity:.8;transform:scale(1)}50%{opacity:1;transform:scale(1.12)}}
  #sun .core{position:absolute;inset:14%;border-radius:50%;
    background:radial-gradient(circle at 40% 35%, #fff 0%, #ffe9c2 45%, #ffb867 100%);
    box-shadow:0 0 60px 12px rgba(255,200,120,.55)}
  #sun .dl{position:relative;z-index:2;width:56px;height:56px;color:#3a2408;
    filter:drop-shadow(0 1px 2px rgba(255,255,255,.6));transition:transform .3s}
  #sun:hover{animation-play-state:paused}
  #sun:hover .dl{transform:translateY(3px) scale(1.08)}
  #sun:hover .glow{animation:none;opacity:1;transform:scale(1.25)}
  .hint{position:fixed;top:calc(50% + 110px);left:50%;transform:translateX(-50%);z-index:5;
    color:rgba(255,235,205,.55);font-size:12px;letter-spacing:.35em;text-transform:uppercase;
    pointer-events:none;animation:hintpulse 3s ease-in-out infinite}
  @keyframes hintpulse{0%,100%{opacity:.4}50%{opacity:.75}}

  /* ── BLOQUEO MÓVIL ── */
  #mobile-block{position:fixed;inset:0;z-index:9999;background:#000;display:flex;
    align-items:center;justify-content:center;text-align:center;padding:32px;
    opacity:0;pointer-events:none;transition:opacity 1.3s ease}
  #mobile-block.show{opacity:1;pointer-events:all}
  #mobile-block .mb{color:#fff;font-size:clamp(17px,5.5vw,26px);font-weight:300;letter-spacing:.16em;line-height:1.9}

  @media (prefers-reduced-motion:reduce){.star,#sun,#sun .glow,.hint{animation:none}}
</style>
</head>
<body>
  <div id="space"></div>
  <div id="stars"></div>
  <div id="rays"></div>

  <a id="sun" href="https://github.com/KazooGod02/projectk-launcher/releases/latest">
    <div class="glow"></div>
    <div class="core"></div>
    <svg class="dl" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
  </a>
  <div class="hint">descargar</div>

  <!-- Bloqueo en móvil -->
  <div id="mobile-block"><div class="mb">ESTA PÁGINA SOLO ES ACCESIBLE MEDIANTE PC</div></div>

<script>
  // ── Estrellas ──
  (function makeStars(){
    let html='';
    for(let i=0;i<220;i++){
      const s=(Math.random()*2+0.4).toFixed(1);
      const x=(Math.random()*100).toFixed(2), y=(Math.random()*100).toFixed(2);
      const d=(Math.random()*3+1.2).toFixed(1);
      html+=`<div class="star" style="width:${s}px;height:${s}px;left:${x}%;top:${y}%;--d:${d}s"></div>`;
    }
    document.getElementById('stars').innerHTML=html;
  })();

  // ── Estrella fugaz ocasional ──
  function shootingStar(){
    const el=document.createElement('div');
    el.className='shootingstar';
    const y=Math.random()*40, x=Math.random()*60;
    const ang=(Math.random()*20+20);
    el.style.top=y+'%'; el.style.left=x+'%';
    el.style.transform=`rotate(${ang}deg)`;
    el.style.opacity='0';
    document.body.appendChild(el);
    el.animate([
      {transform:`rotate(${ang}deg) translateX(0)`,opacity:0},
      {opacity:1,offset:.2},
      {transform:`rotate(${ang}deg) translateX(60vw)`,opacity:0}
    ],{duration:900,easing:'ease-out'});
    setTimeout(()=>el.remove(),950);
    setTimeout(shootingStar, 4000+Math.random()*8000);
  }
  setTimeout(shootingStar, 3000);

  // ── Rayos de luz aleatorios desde el sol ──
  function spawnRay(){
    const ray=document.createElement('div');
    ray.className='ray';
    const angle=Math.random()*360;
    const len=(110+Math.random()*300).toFixed(0)+'px';
    const rt=(0.9+Math.random()*0.9).toFixed(2)+'s';
    const h=(1+Math.random()*2.5).toFixed(1);
    ray.style.transform=`rotate(${angle}deg)`;
    ray.style.height=h+'px';
    ray.style.setProperty('--len',len);
    ray.style.setProperty('--rt',rt);
    document.getElementById('rays').appendChild(ray);
    requestAnimationFrame(()=>ray.classList.add('go'));
    setTimeout(()=>ray.remove(), 2200);
  }
  function scheduleRay(){
    // a veces uno, a veces varios a la vez
    const burst=Math.random()<0.25 ? 2+Math.floor(Math.random()*3) : 1;
    for(let i=0;i<burst;i++) setTimeout(spawnRay, i*90);
    setTimeout(scheduleRay, 250+Math.random()*1100);
  }
  scheduleRay();

  // ── Descarga: última versión del launcher ──
  (async function(){
    try{
      const r=await fetch('https://api.github.com/repos/KazooGod02/projectk-launcher/releases/latest');
      const j=await r.json();
      const exe=(j.assets||[]).find(a=>/Setup.*\.exe$/i.test(a.name));
      if(exe) document.getElementById('sun').href=exe.browser_download_url;
    }catch(_){}
  })();

  // ── Bloqueo móvil ──
  (function(){
    const ua=navigator.userAgent||'';
    const isMobile=/Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini|Mobile/i.test(ua)
      || (('ontouchstart' in window) && window.matchMedia('(max-width: 820px)').matches);
    if(isMobile){
      const mb=document.getElementById('mobile-block');
      document.documentElement.style.overflow='hidden'; document.body.style.overflow='hidden';
      requestAnimationFrame(()=>requestAnimationFrame(()=>mb.classList.add('show')));
    }
  })();
</script>
</body>
</html>
