<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Project K</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',system-ui,sans-serif;cursor:default}
  #sky{position:fixed;inset:0;transition:background 2s linear;z-index:0}
  /* capa de estrellas */
  #stars{position:fixed;inset:0;z-index:1;pointer-events:none;transition:opacity 2s linear}
  .star{position:absolute;background:#fff;border-radius:50%;animation:tw var(--d) ease-in-out infinite alternate}
  @keyframes tw{from{opacity:.15}to{opacity:1}}
  /* resplandor cálido del horizonte (amanecer/atardecer) */
  #glow{position:fixed;left:0;right:0;bottom:0;height:55%;z-index:2;pointer-events:none;transition:opacity 2s linear;
        background:radial-gradient(ellipse 80% 100% at 50% 120%, rgba(255,150,70,.55) 0%, rgba(255,110,60,.18) 40%, transparent 70%)}
  /* marca K, abajo al centro, pequeña y semitransparente */
  #kmark{position:fixed;bottom:5.5%;left:50%;transform:translateX(-50%);z-index:4;height:38px;width:auto;
         opacity:.45;pointer-events:none;filter:drop-shadow(0 0 6px rgba(255,255,255,.25))}

  /* ── LUZ CENTRAL / BOTÓN OJO ── */
  #eye{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;
       width:120px;height:120px;display:flex;align-items:center;justify-content:center;
       cursor:pointer;transition:width .5s cubic-bezier(.2,.8,.2,1),height .5s cubic-bezier(.2,.8,.2,1)}
  /* el spot blurred blanco siempre visible */
  #eye .spot{position:absolute;inset:0;border-radius:50%;
       background:radial-gradient(circle, rgba(255,255,255,.95) 0%, rgba(255,255,255,.5) 30%, rgba(255,255,255,0) 70%);
       filter:blur(6px);animation:pulse 4s ease-in-out infinite;transition:all .5s}
  @keyframes pulse{0%,100%{opacity:.85;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
  /* halo exterior */
  #eye::before{content:'';position:absolute;width:240%;height:240%;border-radius:50%;
       background:radial-gradient(circle, rgba(255,255,255,.25) 0%, transparent 60%);
       filter:blur(14px);transition:all .5s;pointer-events:none}
  /* el ojo, oculto por defecto */
  #eye .eye-icon{position:relative;z-index:2;width:60%;height:60%;opacity:0;transform:scale(.7);
       transition:opacity .45s ease, transform .45s cubic-bezier(.2,.8,.2,1);
       color:#0a0a12;filter:drop-shadow(0 0 6px rgba(255,255,255,.8))}
  /* hover: se agranda y aparece el ojo */
  #eye:hover{width:200px;height:200px}
  #eye:hover .spot{filter:blur(3px);background:radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,255,255,.65) 45%, rgba(255,255,255,0) 72%)}
  #eye:hover::before{width:280%;height:280%;background:radial-gradient(circle, rgba(255,255,255,.45) 0%, transparent 62%)}
  #eye:hover .eye-icon{opacity:1;transform:scale(1)}

  /* ── CONTADOR (arriba del círculo central) ── */
  #cd{position:fixed;top:33%;left:50%;transform:translate(-50%,-50%);z-index:5;
      display:flex;align-items:flex-start;gap:12px;color:rgba(255,255,255,.92);
      font-variant-numeric:tabular-nums;pointer-events:none;text-shadow:0 0 20px rgba(255,255,255,.35)}
  #cd .u{display:flex;flex-direction:column;align-items:center;min-width:58px}
  #cd .u span{font-size:42px;font-weight:200;line-height:1;letter-spacing:.04em}
  #cd .u i{font-size:10px;font-style:normal;letter-spacing:.25em;text-transform:uppercase;
           color:rgba(255,255,255,.45);margin-top:8px}
  #cd .s{font-size:32px;font-weight:200;color:rgba(255,255,255,.35);margin-top:3px}

  /* ── BLOQUEO MÓVIL (fade a negro) ── */
  #mobile-block{position:fixed;inset:0;z-index:9999;background:#000;display:flex;
       align-items:center;justify-content:center;text-align:center;padding:32px;
       opacity:0;pointer-events:none;transition:opacity 1.3s ease}
  #mobile-block.show{opacity:1;pointer-events:all}
  #mobile-block .mb{color:#fff;font-size:clamp(17px,5.5vw,26px);font-weight:300;
       letter-spacing:.16em;line-height:1.9}

  @media (prefers-reduced-motion:reduce){.star,#eye .spot{animation:none}}
</style>
</head>
<body>
  <div id="sky"></div>
  <div id="stars"></div>
  <div id="glow"></div>
  <img id="kmark" src="k.png" alt="K" onerror="this.style.display='none'"/>

  <!-- Bloqueo en móvil -->
  <div id="mobile-block"><div class="mb">ESTA PÁGINA SOLO ES ACCESIBLE MEDIANTE PC</div></div>

  <!-- Contador arriba del círculo central -->
  <div id="cd">
    <div class="u"><span id="cd-d">00</span><i>días</i></div>
    <div class="s">:</div>
    <div class="u"><span id="cd-h">00</span><i>hrs</i></div>
    <div class="s">:</div>
    <div class="u"><span id="cd-m">00</span><i>min</i></div>
    <div class="s">:</div>
    <div class="u"><span id="cd-s">00</span><i>seg</i></div>
  </div>

  <a id="eye" href="#" title="">
    <div class="spot"></div>
    <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/>
      <circle cx="12" cy="12" r="3.2" fill="currentColor"/>
    </svg>
  </a>


<script>
  // ── Enlace de descarga del launcher oculto ("aún no público") ──
  const DOWNLOAD_URL = "https://github.com/KazooGod02/projectk-launcher/releases/download/teaser/Project-K-Setup.exe";
  document.getElementById('eye').setAttribute('href', DOWNLOAD_URL);

  // ── Paleta del cielo por hora (top y bottom del degradado) ──
  const SKY = [
    {h:0,    top:[6,8,22],     bot:[16,16,44]},    // noche profunda
    {h:5,    top:[24,20,54],   bot:[92,64,104]},   // previo al alba
    {h:6.5,  top:[44,60,112],  bot:[240,150,108]}, // amanecer
    {h:9,    top:[44,112,212], bot:[190,218,246]}, // mañana
    {h:13,   top:[34,120,218], bot:[176,212,246]}, // mediodía
    {h:17,   top:[44,108,206], bot:[206,216,232]}, // tarde
    {h:18.5, top:[58,40,110],  bot:[228,98,54]},   // atardecer
    {h:20,   top:[26,20,66],   bot:[104,56,92]},   // ocaso
    {h:22,   top:[8,8,28],     bot:[24,24,58]},    // noche
    {h:24,   top:[6,8,22],     bot:[16,16,44]}     // wrap
  ];
  const lerp=(a,b,t)=>a+(b-a)*t;
  const lerpC=(c1,c2,t)=>[Math.round(lerp(c1[0],c2[0],t)),Math.round(lerp(c1[1],c2[1],t)),Math.round(lerp(c1[2],c2[2],t))];
  function skyAt(hour){
    let i=0; while(i<SKY.length-1 && hour>=SKY[i+1].h) i++;
    const a=SKY[i], b=SKY[i+1]||a;
    const t=(b.h-a.h)?(hour-a.h)/(b.h-a.h):0;
    return {top:lerpC(a.top,b.top,t), bot:lerpC(a.bot,b.bot,t)};
  }
  // factor de "noche" (1 = estrellas, 0 = día)
  function nightFactor(h){
    if(h>=7 && h<=17) return 0;
    if(h>5 && h<7)   return (7-h)/2;
    if(h>17 && h<19.5) return (h-17)/2.5;
    return 1;
  }
  // factor "dorado" (amanecer/atardecer) para el resplandor del horizonte
  function goldFactor(h){
    const d1=Math.max(0,1-Math.abs(h-6.7)/1.6);  // amanecer
    const d2=Math.max(0,1-Math.abs(h-18.4)/1.6); // atardecer
    return Math.min(1, d1+d2);
  }
  const skyEl=document.getElementById('sky'),
        starsEl=document.getElementById('stars'),
        glowEl=document.getElementById('glow');

  // generar estrellas una sola vez
  (function makeStars(){
    let html='';
    for(let i=0;i<160;i++){
      const s=(Math.random()*2+0.5).toFixed(1);
      const x=(Math.random()*100).toFixed(2), y=(Math.random()*70).toFixed(2);
      const d=(Math.random()*3+1.5).toFixed(1);
      html+=`<div class="star" style="width:${s}px;height:${s}px;left:${x}%;top:${y}%;--d:${d}s"></div>`;
    }
    starsEl.innerHTML=html;
  })();

  function update(){
    const now=new Date();
    const hour=now.getHours()+now.getMinutes()/60+now.getSeconds()/3600;
    const {top,bot}=skyAt(hour);
    skyEl.style.background=`linear-gradient(to bottom, rgb(${top[0]},${top[1]},${top[2]}) 0%, rgb(${bot[0]},${bot[1]},${bot[2]}) 100%)`;
    starsEl.style.opacity=nightFactor(hour).toFixed(2);
    glowEl.style.opacity=goldFactor(hour).toFixed(2);
  }
  update();
  setInterval(update,1000);

  // ── CONTADOR: lunes 29 de junio de 2026, 5:00 PM hora del Pacífico (PDT) ──
  const TARGET = Date.UTC(2026, 5, 30, 0, 0, 0);
  function cdTick(){
    const diff = TARGET - Date.now();
    const pad = n => String(n).padStart(2,'0');
    const el = id => document.getElementById(id);
    if(diff <= 0){ ['cd-d','cd-h','cd-m','cd-s'].forEach(i=>el(i).textContent='00'); return; }
    const s = Math.floor(diff/1000);
    el('cd-d').textContent = pad(Math.floor(s/86400));
    el('cd-h').textContent = pad(Math.floor(s%86400/3600));
    el('cd-m').textContent = pad(Math.floor(s%3600/60));
    el('cd-s').textContent = pad(s%60);
  }
  cdTick();
  setInterval(cdTick,1000);

  // ── BLOQUEO MÓVIL ──
  (function(){
    const ua = navigator.userAgent || '';
    const isMobile = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini|Mobile/i.test(ua)
                  || (('ontouchstart' in window) && window.matchMedia('(max-width: 820px)').matches);
    if(isMobile){
      const mb = document.getElementById('mobile-block');
      document.documentElement.style.overflow='hidden';
      document.body.style.overflow='hidden';
      requestAnimationFrame(()=>requestAnimationFrame(()=>mb.classList.add('show')));
    }
  })();
</script>
</body>
</html>
